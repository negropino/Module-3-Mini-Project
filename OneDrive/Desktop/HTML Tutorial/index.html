<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section>
        <nav>
            <img src="./assets/FES.svg" alt="logo">
            <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#discord">Discord</a></li>
                <li><a href="#Contact">Contact</a></li>
            </ul>
        </nav>
        <header>
            <div>
                <h1>Best Place to Learn Frontend</h1>
                <p>Go from absolute beginner to pro with a simplified access.</p>
                <button>Start Now</button>
            </div>
            <figure>
                <img src="./assets/laptop.png" alt="Laptop"> 
            </figure>
        </header>
    </section>

    <main>
        <section id="about">
            <h2>About</h2>
            <div>
                <p>
                    This is the ABOUT section.
                </p>
            </div>
        </section>
        <section id="discord">
            <h2>Discord</h2>
            <figure>
                <img src="./assets/discord.png" alt="Discord">
            </figure>
            <div>
                <p>
                    This is the DISCORD section.
                </p>
            </div>
        </section>
        <section id="contact">
            <h2>Contact</h2>
            <form action="">
                <span>Email</span>
                <input type="email" placeholder="Your Email">
                <span>Message</span>
                <textarea type="text" placeholder="This is the text"></textarea>
            </form>
        </section>
    </main>
    <footer>
        <img src="./assets/FES.svg" alt="logo">
        <div>
            <p>This is the footer</p>
        </div>
    </footer>
</body>

</html>
